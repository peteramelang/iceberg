<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Favicon variant of the iceberg-as-graph brand mark. Bolder strokes and
       larger nodes than the in-app 22×22 SVG so it stays legible at 16×16.
       Hex values inline (not tokens) because favicons are static assets;
       chose the dark-theme accent + blue so the light-theme background of
       browser tabs gives enough contrast. -->
  <g stroke="#7c5cff" stroke-width="1.4" stroke-opacity="0.55" fill="none" stroke-linecap="round">
    <line x1="16" y1="6"  x2="11" y2="13" />
    <line x1="16" y1="6"  x2="21" y2="13" />
    <line x1="11" y1="13" x2="21" y2="13" />
    <line x1="11" y1="13" x2="8"  y2="22" />
    <line x1="21" y1="13" x2="24" y2="22" />
    <line x1="8"  y1="22" x2="16" y2="27" />
    <line x1="24" y1="22" x2="16" y2="27" />
    <line x1="11" y1="13" x2="16" y2="27" />
  </g>
  <line x1="2" y1="15.5" x2="30" y2="15.5" stroke="#9a9aa6" stroke-width="0.8" stroke-dasharray="1.5 1.5" />
  <circle cx="16" cy="6"  r="2.5" fill="#7c5cff" />
  <circle cx="11" cy="13" r="2"   fill="#7c5cff" />
  <circle cx="21" cy="13" r="2"   fill="#7c5cff" />
  <circle cx="8"  cy="22" r="1.7" fill="#5ac8fa" />
  <circle cx="24" cy="22" r="1.7" fill="#5ac8fa" />
  <circle cx="16" cy="27" r="1.7" fill="#5ac8fa" />
</svg>
